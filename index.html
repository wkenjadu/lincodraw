<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>린코레일 뽑기판</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background: #151515;
      color: #fff;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .wrap {
      width: 100%;
      max-width: 760px;
    }
    .topbar {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .title {
      font-size: 28px;
      font-weight: 800;
    }
    .btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      background: #333;
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
    }
    button:hover { background: #444; }

    .board {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 4px;
      background: #2f4f8a;
      padding: 6px;
      border-radius: 10px;
      border: 2px solid #7693c6;
    }

    .cell {
      aspect-ratio: 1 / 1;
      border: 1px solid #ccc;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
    }

    /* 기본 (선택 전) = 흰색 */
    .cell.closed {
      background: #ffffff;
      color: #000;
    }

    /* 꽝 = 빨간색 */
    .cell.safe {
      background: #ff4d4d;
      color: #fff;
    }

    /* 당첨 = 초록색 */
    .cell.win {
      background: #4caf50;
      color: #fff;
    }

    .cell.admin-mark {
      box-shadow: inset 0 0 0 3px yellow;
    }

    .panel {
      margin-top: 16px;
      padding: 14px;
      background: #232323;
      border-radius: 12px;
      display: none;
    }
    .panel.show { display: block; }

    .password-box {
      display: none;
      gap: 8px;
      margin-top: 12px;
    }
    .password-box.show { display: flex; }

    input {
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    .status {
      margin-top: 8px;
      color: #ffd77a;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="wrap">

  <div class="topbar">
    <div class="title">린코레일 뽑기판</div>
    <div class="btns">
      <button id="resetPlayerBtn">초기화</button>
      <button id="adminOpenBtn">관리자</button>
    </div>
  </div>

  <div class="board" id="board"></div>

  <div class="password-box" id="passwordBox">
    <input type="password" id="adminPassword" placeholder="비밀번호" />
    <button id="loginBtn">확인</button>
  </div>

  <div class="panel" id="adminPanel">
    <div>관리자 모드</div>
    <button id="saveBtn">저장</button>
    <button id="clearWinnersBtn">당첨 초기화</button>
    <button id="logoutBtn">닫기</button>
    <div class="status" id="adminStatus"></div>
  </div>

</div>

<script>
const TOTAL = 100;
const ADMIN_PASSWORD = "1234";

let winners = JSON.parse(localStorage.getItem("winners") || "[]");
let opened = JSON.parse(localStorage.getItem("opened") || "[]");
let isAdmin = false;

const board = document.getElementById("board");
const adminPanel = document.getElementById("adminPanel");
const passwordBox = document.getElementById("passwordBox");
const status = document.getElementById("adminStatus");

function render() {
  board.innerHTML = "";

  for (let i = 1; i <= TOTAL; i++) {
    const div = document.createElement("div");
    div.className = "cell";

    if (opened.includes(i)) {
      if (winners.includes(i)) {
        div.classList.add("win");
        div.innerText = "당첨";
      } else {
        div.classList.add("safe");
        div.innerText = "꽝";
      }
    } else {
      div.classList.add("closed");
      div.innerText = i;
    }

    if (isAdmin && winners.includes(i) && !opened.includes(i)) {
      div.classList.add("admin-mark");
    }

    div.onclick = () => {
      if (isAdmin) {
        if (winners.includes(i)) {
          winners = winners.filter(v => v !== i);
        } else {
          winners.push(i);
        }
        updateStatus();
        render();
      } else {
        if (!opened.includes(i)) {
          opened.push(i);
          localStorage.setItem("opened", JSON.stringify(opened));
          render();
        }
      }
    };

    board.appendChild(div);
  }
}

function updateStatus() {
  status.innerText = "당첨: " + (winners.length ? winners.join(", ") : "없음");
}

// 관리자 로그인

document.getElementById("adminOpenBtn").onclick = () => {
  passwordBox.classList.toggle("show");
};

document.getElementById("loginBtn").onclick = () => {
  const pw = document.getElementById("adminPassword").value;
  if (pw === ADMIN_PASSWORD) {
    isAdmin = true;
    passwordBox.classList.remove("show");
    adminPanel.classList.add("show");
    updateStatus();
    render();
  } else {
    alert("비밀번호 틀림");
  }
};

// 저장

document.getElementById("saveBtn").onclick = () => {
  localStorage.setItem("winners", JSON.stringify(winners));
  updateStatus();
};

// 초기화

document.getElementById("clearWinnersBtn").onclick = () => {
  winners = [];
  localStorage.setItem("winners", JSON.stringify(winners));
  updateStatus();
  render();
};

// 로그아웃

document.getElementById("logoutBtn").onclick = () => {
  isAdmin = false;
  adminPanel.classList.remove("show");
  render();
};

// 전체 초기화

document.getElementById("resetPlayerBtn").onclick = () => {
  opened = [];
  localStorage.setItem("opened", JSON.stringify(opened));
  render();
};

render();
</script>

</body>
</html>
